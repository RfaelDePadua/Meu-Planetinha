<footer class="site-footer">
  <!-- Wavy top border — SVG Bézier curve (Phase 15, replaces clip-path div) -->
  <svg class="wave-divider wave-divider--footer" viewBox="0 0 1440 48"
       preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"
       aria-hidden="true">
    <path d="M0,20 C360,44 720,0 1080,28 C1260,40 1380,12 1440,20 L1440,48 L0,48 Z"/>
  </svg>

  <div class="footer-container">
    <!-- Left column: logo + tagline -->
    <div class="footer-brand">
      <a class="footer-logo" data-href="index.html" aria-label="Meu Planetinha — Página Inicial">
        <img class="footer-logo-icon" data-src="midia/planetinha-mark.svg" alt="" aria-hidden="true" width="26" height="26">
        <span class="footer-logo-text">Meu Planetinha</span>
      </a>
      <p class="footer-tagline">Aprender é uma aventura!</p>
    </div>

    <!-- Right column: parent-facing link(s) -->
    <div class="footer-links">
      <a data-href="mailto:contato@meuplanetinha.com">Contato</a>
    </div>
  </div>

  <!-- Decorative stars (4 small SVGs, absolutely positioned by CSS) -->
  <div class="footer-stars" aria-hidden="true">
    <svg class="footer-star footer-star--1" width="12" height="12" viewBox="0 0 12 12" fill="var(--cor-amarelo-sol)">
      <polygon points="6,0 7.5,4.5 12,4.5 8.25,7.5 9.75,12 6,9 2.25,12 3.75,7.5 0,4.5 4.5,4.5"/>
    </svg>
    <svg class="footer-star footer-star--2" width="8" height="8" viewBox="0 0 12 12" fill="var(--cor-amarelo-sol)">
      <polygon points="6,0 7.5,4.5 12,4.5 8.25,7.5 9.75,12 6,9 2.25,12 3.75,7.5 0,4.5 4.5,4.5"/>
    </svg>
    <svg class="footer-star footer-star--3" width="10" height="10" viewBox="0 0 12 12" fill="var(--cor-rosa-chiclete)">
      <polygon points="6,0 7.5,4.5 12,4.5 8.25,7.5 9.75,12 6,9 2.25,12 3.75,7.5 0,4.5 4.5,4.5"/>
    </svg>
    <svg class="footer-star footer-star--4" width="6" height="6" viewBox="0 0 12 12" fill="var(--cor-lilas-algodao)">
      <polygon points="6,0 7.5,4.5 12,4.5 8.25,7.5 9.75,12 6,9 2.25,12 3.75,7.5 0,4.5 4.5,4.5"/>
    </svg>
  </div>
</footer>
