<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contando Estrelas</title>

  <!-- Fontes do jogo: Fredoka (números/contas) + Pixelify Sans (títulos/HUD) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Pixelify+Sans:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #160419; overflow: hidden; }
    #game-container {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
  </style>

  <!-- Biblioteca Phaser -->
  <script src="phaser.min.js"></script>

  <!-- Script do Jogo -->
  <script src="main.js" type="module"></script>
</head>
<body>
  <div id="game-container"></div>
</body>
</html>
